<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stanza Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020f0a;
        color: #ecfdf5;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        box-sizing: border-box;
        padding:
          calc(env(safe-area-inset-top) + 16px)
          calc(env(safe-area-inset-right) + 16px)
          calc(env(safe-area-inset-bottom) + 16px)
          calc(env(safe-area-inset-left) + 16px);
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(16, 185, 129, 0.10), transparent 32%),
          linear-gradient(180deg, #020f0a 0%, #020604 60%, #020f0a 100%);
      }

      main {
        width: min(88vw, 460px);
        border: 1px solid rgba(16, 185, 129, 0.28);
        border-radius: 18px;
        padding: 32px;
        background: rgba(6, 20, 17, 0.82);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      }

      p:first-child {
        margin: 0 0 8px;
        color: #34d399;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.1;
      }

      .brand-wordmark {
        font-weight: 800;
        letter-spacing: -0.01em;
      }

      .brand-wordmark .brand-s {
        color: #34d399;
        text-shadow: 0 0 10px rgba(52, 211, 153, 0.55);
      }

      .brand-wordmark .brand-rest {
        color: #ecfdf5;
      }

      p:last-child {
        margin: 14px 0 0;
        color: #a3a3a3;
        font-size: 14px;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Offline mode</p>
      <h1><span class="brand-wordmark"><span class="brand-s">S</span><span class="brand-rest">tanza</span></span> is offline</h1>
      <p>You are offline. Some HR actions require connection. Reconnect to sign in, clock in or out, submit requests, manage payroll, and sync live workspace data.</p>
    </main>
  </body>
</html>
