<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stanza Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020403;
        color: #ecfdf5;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(16, 185, 129, 0.18), transparent 32%),
          linear-gradient(180deg, #020403 0%, #03100b 60%, #020403 100%);
      }

      main {
        width: min(88vw, 460px);
        border: 1px solid rgba(16, 185, 129, 0.28);
        border-radius: 18px;
        padding: 32px;
        background: rgba(6, 20, 17, 0.82);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      }

      p:first-child {
        margin: 0 0 8px;
        color: #34d399;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.1;
      }

      p:last-child {
        margin: 14px 0 0;
        color: #a3a3a3;
        font-size: 14px;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Offline mode</p>
      <h1>Stanza is offline</h1>
      <p>Reconnect to continue using live HR workflows.</p>
    </main>
  </body>
</html>
